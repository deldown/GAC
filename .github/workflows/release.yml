name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -q

      - name: Rename JAR
        run: mv target/gac-*.jar target/GAC.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/GAC.jar
